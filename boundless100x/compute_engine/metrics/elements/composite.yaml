# Cross-element derived metrics (from Dec 2025 Quality-Growth Matrix)
element: composite

metrics:
  quality_growth_quadrant:
    name: "Quality-Growth Matrix Position"
    module: "builtin.composite"
    function: "compute_qg_quadrant"
    inputs: ["financials", "ratios"]
    params:
      quality_threshold: 15
      growth_threshold: 15
    scoring:
      mode: "categorical"
      categories:
        "true_wealth_creator": 10
        "quality_trap": 4
        "growth_trap": 4
        "wealth_destroyer": 1
      weight: 0.0
    display: { format: "{}", section: "executive_summary", peer_compare: true }
