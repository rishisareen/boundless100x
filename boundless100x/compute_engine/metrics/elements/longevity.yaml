# Reference: "Extending CAP (Competitive Advantage Period)" (Motilal Oswal 2014)
element: longevity

metrics:
  roce_consistency:
    name: "RoCE > 15% Count (10yr)"
    module: "builtin.longevity"
    function: "compute_threshold_consistency"
    inputs: ["ratios"]
    params: { field: "roce", years: 10, threshold: 15 }
    scoring: { thresholds: [3, 5, 6, 7, 8, 9], direction: "higher_is_better", weight: 0.20 }
    display: { format: "{}/10 years", section: "longevity_assessment", peer_compare: true }

  cap_proxy:
    name: "CAP Proxy (Consecutive yrs RoCE > CoE)"
    module: "builtin.longevity"
    function: "compute_cap_proxy"
    inputs: ["ratios"]
    params: { roce_threshold: 12 }
    scoring: { thresholds: [1, 3, 5, 7, 8, 10], direction: "higher_is_better", weight: 0.20 }
    display: { format: "{} consecutive years", section: "longevity_assessment", peer_compare: true }

  revenue_growth_streak:
    name: "Max Consecutive Growth Years (>10%)"
    module: "builtin.longevity"
    function: "compute_growth_streak"
    inputs: ["financials"]
    params: { field: "revenue", threshold_pct: 10 }
    scoring: { thresholds: [1, 2, 3, 4, 6, 8], direction: "higher_is_better", weight: 0.15 }
    display: { format: "{} consecutive years", section: "longevity_assessment", peer_compare: true }

  gross_margin_stability:
    name: "Gross Margin Stability (10yr StdDev)"
    module: "builtin.longevity"
    function: "compute_margin_stability"
    inputs: ["financials"]
    params: { field: "opm_pct", years: 10 }
    scoring: { thresholds: [15, 10, 8, 5, 3, 1.5], direction: "lower_is_better", weight: 0.15 }
    display: { format: "σ = {:.1f}pp", section: "longevity_assessment", peer_compare: true }

  reinvestment_rate:
    name: "Reinvestment Rate (Capex/Depreciation)"
    module: "builtin.longevity"
    function: "compute_reinvestment_rate"
    inputs: ["financials", "cashflow"]
    scoring: { thresholds: [0.5, 0.8, 1.0, 1.5, 2.0, 3.0], direction: "higher_is_better", weight: 0.15 }
    display: { format: "{:.1f}x", section: "longevity_assessment", peer_compare: true }

  fcf_consistency:
    name: "FCF Positive Count (10yr)"
    module: "builtin.longevity"
    function: "compute_fcf_consistency"
    inputs: ["cashflow"]
    params: { years: 10 }
    scoring: { thresholds: [3, 5, 6, 7, 8, 9], direction: "higher_is_better", weight: 0.15 }
    display: { format: "{}/10 years", section: "longevity_assessment", peer_compare: true }
